name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - dev # dev environment
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Stage Static App
        run: |
          rm -rf .swa-static
          mkdir -p .swa-static
          git archive --format=tar HEAD | tar -xf - -C .swa-static
          rm -rf .swa-static/api .swa-static/.github
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_014D1E603 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: 'upload'
          ###### Repository/Build Configurations - ######
          # For more information SWA workflow: https://aka.ms/swaworkflowconfig
          app_location: '.swa-static' # App source code path
          api_location: 'api' # Api source code path - optional
          output_location: '' # Built app content directory - optional
          skip_app_build: true
          production_branch: 'main'
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_014D1E603 }}
          action: 'close'
