<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Background red gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5283D"/>    <!-- Bright Latvian Red -->
      <stop offset="100%" stop-color="#80121F"/>  <!-- Darker Crimson -->
    </linearGradient>
    
    <!-- White stripe gradient -->
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F2F2"/>
    </linearGradient>

    <!-- Glossy spotlight effect -->
    <radialGradient id="highlight" cx="25%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Border highlight to make it pop like iOS -->
    <linearGradient id="borderShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Drop shadow for the main shape to give it 3D depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4A050D" flood-opacity="0.4"/>
    </filter>

    <!-- Shadow for the book icon inside -->
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#4A050D" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base rounded rectangle shape -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#bgGrad)" filter="url(#dropShadow)"/>

  <!-- Flag's white stripe in the middle, typical LV ratio (2:1:2) -> roughly 20px high in a 100px square -->
  <rect x="10" y="50" width="100" height="20" fill="url(#stripeGrad)"/>

  <!-- Outline for a refined 3D glassy edge -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="none" stroke="url(#borderShine)" stroke-width="1.5"/>

  <!-- Premium open book icon centered in the box -->
  <!-- Left Page -->
  <path d="M 34 38 C 40 38 52 42 60 48 L 60 82 C 52 76 40 72 34 72 C 30 72 30 38 34 38 Z" fill="#FFFFFF" filter="url(#iconShadow)"/>
  <!-- Right Page -->
  <path d="M 86 38 C 80 38 68 42 60 48 L 60 82 C 68 76 80 72 86 72 C 90 72 90 38 86 38 Z" fill="#F7F7F7" filter="url(#iconShadow)"/>

  <!-- Left page lines (simulating text) -->
  <path d="M 39 50 C 44 50 51 53 55 55" stroke="url(#bgGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 39 58 C 44 58 51 61 55 63" stroke="url(#bgGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 39 66 C 44 66 51 69 55 71" stroke="url(#bgGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right page lines -->
  <path d="M 81 50 C 76 50 69 53 65 55" stroke="url(#bgGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 81 58 C 76 58 69 61 65 63" stroke="url(#bgGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 81 66 C 76 66 69 69 65 71" stroke="url(#bgGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Book spine center line for depth -->
  <line x1="60" y1="49" x2="60" y2="81" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Gloss mask highlight over the entire shape -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#highlight)" style="pointer-events: none;"/>
</svg>
